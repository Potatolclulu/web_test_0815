<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Cuisine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f9f9f9;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .menu-item {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .menu-item:hover {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <h1>日本料理 (Japanese Cuisine)</h1>
</header>

<div class="menu">
    <div class="menu-item" onclick="alert('寿司が選択されました！')">寿司 (Sushi)</div>
    <div class="menu-item" onclick="alert('天ぷらが選択されました！')">天ぷら (Tempura)</div>
    <div class="menu-item" onclick="alert('ラーメンが選択されました！')">ラーメン (Ramen)</div>
</div>

<footer>
    <p>&copy; 2026 Japanese Cuisine. All rights reserved.</p>
</footer>

</body>
</html>
